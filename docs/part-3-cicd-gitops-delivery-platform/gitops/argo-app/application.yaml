apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argo-test
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://gitlab.ducanh.io.vn/e-commerce-dotnet/gitops.git
    targetRevision: master
    path: apps/backend/auth
  destination:
    server: https://kubernetes.default.svc
    namespace: backend
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
